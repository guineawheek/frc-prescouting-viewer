<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRC Viewer</title>
<style>
:root {
  --primary: #1565c0;
  --red: #c62828;
  --blue: #1565c0;
  --border: #e0e0e0;
  --bg: #f4f6f9;
  --surface: #ffffff;
  --text: #212121;
  --text-dim: #757575;
  --selected-bg: #e3f2fd;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
header {
  background: var(--primary);
  color: #fff;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,.25);
  flex-shrink: 0;
  z-index: 10;
}
header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .3px; margin-right: 4px; }

#event-input {
  padding: 5px 10px;
  border: none;
  border-radius: 4px;
  font-size: 0.88rem;
  width: 160px;
  outline: none;
}

header button {
  padding: 5px 14px;
  border-radius: 4px;
  border: none;
  font-size: 0.83rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
header button:disabled { opacity: .4; cursor: default; }
#btn-load { background: #fff; color: var(--primary); }
#btn-load:hover:not(:disabled) { background: #e8f0fe; }
#btn-refresh { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.4); }
#btn-refresh:hover:not(:disabled) { background: rgba(255,255,255,.25); }

#status { margin-left: auto; font-size: 0.78rem; opacity: .9; max-width: 260px; text-align: right; }
#status.error { color: #ffcdd2; }

/* ── Main layout ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Left panel ── */
.left-panel {
  width: 42%;
  min-width: 240px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.panel-header {
  padding: 6px 12px;
  background: #f5f5f5;
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .5px;
  flex-shrink: 0;
}

#teams-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }

/* Teams table */
#teams-table { width: 100%; border-collapse: collapse; font-size: 0.81rem; }
#teams-table thead { position: sticky; top: 0; z-index: 2; }

#teams-table th {
  background: #eeeeee;
  border-bottom: 2px solid var(--border);
  padding: 6px 8px;
  text-align: left;
  font-size: 0.73rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
#teams-table th:hover { background: #e0e0e0; }
#teams-table th.sorted { color: var(--primary); }
#teams-table th .arrow { margin-left: 2px; font-size: .7rem; }

#teams-table td { padding: 5px 8px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
#teams-table tbody tr { cursor: pointer; }
#teams-table tbody tr:hover td { background: #fafafa; }
#teams-table tbody tr.active td { background: var(--selected-bg); }

.col-num { width: 52px; }
.col-loc { width: 130px; }
.col-epa { width: 64px; text-align: right; }

.team-num { font-weight: 700; color: var(--primary); font-size: .84rem; }
.team-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 170px; }
.loc-text { color: var(--text-dim); font-size: .76rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.epa-badge {
  display: inline-block; padding: 2px 7px; border-radius: 3px;
  font-size: .79rem; font-weight: 700; color: #fff;
  font-variant-numeric: tabular-nums; min-width: 48px; text-align: center;
}

/* ── Resize handles ── */
.resize-h {
  width: 5px;
  flex-shrink: 0;
  cursor: col-resize;
  background: var(--border);
  transition: background .12s;
  z-index: 5;
}
.resize-h:hover, .resize-h.dragging { background: var(--primary); }

.resize-v {
  height: 5px;
  width: 100%;
  flex-shrink: 0;
  cursor: row-resize;
  background: #333;
  transition: background .12s;
}
.resize-v:hover, .resize-v.dragging { background: var(--primary); }

body.dragging-h, body.dragging-h * { cursor: col-resize !important; user-select: none; }
body.dragging-v, body.dragging-v * { cursor: row-resize !important; user-select: none; }

/* ── Right panel ── */
.right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); min-width: 0; }

#matches-scroll { flex: 1; overflow-y: auto; padding: 10px; min-height: 0; }

/* ── Match groups ── */
.event-group { margin-bottom: 18px; }

.event-group-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  padding: 4px 0 6px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 6px;
}

/* ── Match table (ftcscout-style) ── */
.match-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .8rem;
  background: var(--surface);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.match-table thead tr th {
  padding: 5px 6px;
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .4px;
  border-bottom: 2px solid rgba(0,0,0,.12);
}
.th-match { width: 46px; background: #f0f0f0; color: #777; text-align: center; }
.th-score { width: 84px; background: #f0f0f0; color: #777; text-align: center; }
.th-red   { background: var(--red);  color: #fff; text-align: center; }
.th-blue  { background: var(--blue); color: #fff; text-align: center; }

.match-table tbody tr {
  cursor: pointer;
  transition: filter .08s;
}
.match-table tbody tr:hover { filter: brightness(.95); }

/* Active row: left accent + subtle highlight */
.match-table tbody tr.active .td-match { border-left: 3px solid var(--primary); }
.match-table tbody tr.active td { background-color: rgba(21,101,192,.07) !important; }

.match-table td { padding: 5px 3px; border-bottom: 1px solid #f2f2f2; vertical-align: middle; }
.match-table tbody tr:last-child td { border-bottom: none; }

/* Match label cell */
.td-match {
  text-align: center;
  font-size: .7rem;
  font-weight: 700;
  color: #555;
  padding: 5px 4px;
  white-space: nowrap;
  background: #fafafa;
  border-right: 1px solid var(--border);
  border-left: 3px solid transparent;
}
.td-match.has-video::after { content: ' ▶'; font-size: .5rem; opacity: .4; }

/* Score cell */
.td-score {
  text-align: center;
  padding: 4px 6px;
  white-space: nowrap;
  border-right: 1px solid var(--border);
}
.score-line {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 4px;
  font-variant-numeric: tabular-nums;
  font-weight: 700;
  font-size: .88rem;
  line-height: 1.2;
}
.s-r { color: var(--red); }
.s-b { color: var(--blue); }
.s-r.win { font-size: 1rem; }
.s-b.win { font-size: 1rem; }
.score-sep { color: #bbb; font-weight: 400; font-size: .75em; }
.rp-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  margin-top: 3px;
  min-height: 8px;
}
.rp-grp { display: flex; gap: 2px; align-items: center; min-width: 12px; }
.rp-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.rp-dot.r { background: #e57373; }
.rp-dot.b { background: #64b5f6; }

/* Team cells */
.tc {
  text-align: center;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-size: .78rem;
  white-space: nowrap;
  padding: 5px 4px;
}
.tc.r  { background: #fff5f5; color: #b71c1c; }
.tc.b  { background: #f3f7ff; color: #0d47a1; }
.tc.hl.r { background: #ffcdd2; font-weight: 800; }
.tc.hl.b { background: #bbdefb; font-weight: 800; }

/* ── Video panel ── */
#video-panel {
  flex-shrink: 0;
  background: #111;
  display: none;
  height: 50vh;
  flex-direction: column;
}
#video-panel.visible { display: flex; }

#yt-embed { width: 100%; flex: 1; border: none; display: block; min-height: 0; }

/* ── Placeholder / loading / error ── */
.placeholder, .loading-msg, .error-msg {
  display: flex; align-items: center; justify-content: center;
  height: 120px; font-size: .85rem; color: var(--text-dim);
}
.error-msg { color: #c62828; }
</style>
</head>
<body>

<header>
  <h1>FRC Viewer</h1>
  <input id="event-input" type="text" placeholder="Event code (e.g. 2026gal)" autocomplete="off" spellcheck="false">
  <button id="btn-load">Load</button>
  <button id="btn-refresh" disabled>Refresh EPA</button>
  <span id="status"></span>
</header>

<div class="main">
  <div class="left-panel">
    <div class="panel-header" id="teams-header">Teams</div>
    <div id="teams-scroll">
      <div class="placeholder">Enter an event code and click Load</div>
    </div>
  </div>

  <div class="resize-h" id="h-resizer"></div>

  <div class="right-panel">
    <div class="panel-header" id="matches-header">Matches</div>
    <div id="matches-scroll">
      <div class="placeholder">Select a team to view their matches</div>
    </div>
    <div id="video-panel">
      <div class="resize-v" id="v-resizer"></div>
      <iframe id="yt-embed" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>
  </div>
</div>

<script>
'use strict';

let currentEvent = '';
let teamsData = [];
let allMatches = [];
let sortKey = 'epa';
let sortAsc = false;
let selectedTeam = null;
let selectedMatchKey = null;
const eventNameCache = {};

const eventInput    = document.getElementById('event-input');
const btnLoad       = document.getElementById('btn-load');
const btnRefresh    = document.getElementById('btn-refresh');
const statusEl      = document.getElementById('status');
const teamsHeader   = document.getElementById('teams-header');
const teamsScroll   = document.getElementById('teams-scroll');
const matchesHeader = document.getElementById('matches-header');
const matchesScroll = document.getElementById('matches-scroll');
const videoPanel    = document.getElementById('video-panel');
const ytEmbed       = document.getElementById('yt-embed');
const leftPanel     = document.querySelector('.left-panel');
const hResizer      = document.getElementById('h-resizer');
const vResizer      = document.getElementById('v-resizer');

// ── Utilities ──────────────────────────────────────────────────────────────

function setStatus(msg, isError = false) {
  statusEl.textContent = msg;
  statusEl.className = isError ? 'error' : '';
}

function epaColor(epa, min, max) {
  if (epa == null) return '#bdbdbd';
  const t = Math.max(0, Math.min(1, (epa - min) / (max - min || 1)));
  return `hsl(${Math.round(t * 120)}, 68%, 38%)`;
}

const LEVEL_ORDER = { qm: 0, ef: 1, qf: 2, sf: 3, f: 4 };

function matchSortKey(m) {
  return [LEVEL_ORDER[m.comp_level] ?? 9, m.set_number, m.match_number];
}

function matchLabel(m) {
  const abbr = { qm: 'Q', ef: 'R8', qf: 'QF', sf: 'SF', f: 'F' };
  const a = abbr[m.comp_level] ?? m.comp_level.toUpperCase();
  return m.comp_level === 'qm' ? a + m.match_number : `${a}${m.set_number}-${m.match_number}`;
}

function scoreDisplay(s) { return (s == null || s === -1) ? '—' : s; }

function getRpDotCount(match, alliance) {
  const sb = match.score_breakdown?.[alliance];
  if (!sb) return 0;
  // Prefer explicit boolean achievement flags
  let count = 0;
  for (const [key, val] of Object.entries(sb)) {
    if (val === true && (key.endsWith('BonusAchieved') || key.endsWith('RpAchieved'))) count++;
  }
  if (count > 0) return count;
  // Fallback: total rp minus win/tie rp
  const totalRp = sb.rp ?? 0;
  const winner = match.winning_alliance;
  const rs = match.alliances?.red?.score ?? -1;
  const bs = match.alliances?.blue?.score ?? -1;
  const tied = rs >= 0 && rs === bs;
  const winRp = winner === alliance ? 2 : (tied ? 1 : 0);
  return Math.max(0, totalRp - winRp);
}

function rpDotsHtml(n) {
  return Array(n).fill('<span class="rp-dot"></span>').join('');
}

// ── Event name cache ───────────────────────────────────────────────────────

async function fetchEventNames(keys) {
  const needed = keys.filter(k => !(k in eventNameCache));
  if (!needed.length) return;
  try {
    const r = await fetch('/api/events/names?keys=' + needed.join(','));
    if (r.ok) Object.assign(eventNameCache, await r.json());
  } catch (_) {}
}

// ── Load event ─────────────────────────────────────────────────────────────

async function loadEvent() {
  const code = eventInput.value.trim().toLowerCase();
  if (!code) return;
  currentEvent = code;
  selectedTeam = null;
  selectedMatchKey = null;
  teamsData = [];
  videoPanel.classList.remove('visible');
  matchesScroll.innerHTML = '<div class="placeholder">Select a team to view their matches</div>';
  matchesHeader.textContent = 'Matches';
  teamsScroll.innerHTML = '<div class="loading-msg">Loading teams…</div>';
  btnRefresh.disabled = true;
  setStatus('Loading teams…');

  try {
    const r = await fetch(`/api/event/${code}/teams`);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.statusText);
    teamsData = data;
    teamsHeader.textContent = `Teams (${teamsData.length})`;
    btnRefresh.disabled = false;
    const withEpa = teamsData.filter(t => t.epa != null).length;
    setStatus(`${teamsData.length} teams · EPA: ${withEpa > 0 ? `${withEpa} cached` : 'unavailable'}`);
    renderTeams();
  } catch (e) {
    teamsScroll.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
    setStatus('Failed to load teams', true);
  }
}

btnLoad.addEventListener('click', loadEvent);
eventInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadEvent(); });

// ── Render teams table ──────────────────────────────────────────────────────

function renderTeams() {
  const sorted = [...teamsData].sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortAsc ? av - bv : bv - av;
  });

  const epas = teamsData.map(t => t.epa).filter(e => e != null);
  const minEpa = epas.length ? Math.min(...epas) : 0;
  const maxEpa = epas.length ? Math.max(...epas) : 1;

  const cols = [
    { key: 'team_number', label: '#' },
    { key: 'nickname',    label: 'Team' },
    { key: 'location',   label: 'Location' },
    { key: 'epa',        label: 'EPA' },
  ];

  let h = '<table id="teams-table"><thead><tr>';
  for (const c of cols) {
    const active = sortKey === c.key;
    const arrow = active ? (sortAsc ? '↑' : '↓') : '';
    h += `<th class="${active ? 'sorted' : ''} col-${c.key}" data-key="${c.key}">${c.label}<span class="arrow">${arrow}</span></th>`;
  }
  h += '</tr></thead><tbody>';

  for (const t of sorted) {
    const color = epaColor(t.epa, minEpa, maxEpa);
    const epaStr = t.epa != null ? t.epa.toFixed(1) : '—';
    h += `<tr class="${selectedTeam === t.team_number ? 'active' : ''}" data-team="${t.team_number}">
      <td class="col-num"><span class="team-num">${t.team_number}</span></td>
      <td class="col-team"><div class="team-name" title="${t.nickname}">${t.nickname}</div></td>
      <td class="col-loc"><div class="loc-text" title="${t.location}">${t.location || '—'}</div></td>
      <td class="col-epa"><span class="epa-badge" style="background:${color}">${epaStr}</span></td>
    </tr>`;
  }
  h += '</tbody></table>';
  teamsScroll.innerHTML = h;

  teamsScroll.querySelectorAll('#teams-table th').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (sortKey === key) sortAsc = !sortAsc;
      else { sortKey = key; sortAsc = key !== 'epa'; }
      renderTeams();
    });
  });
  teamsScroll.querySelectorAll('#teams-table tbody tr').forEach(tr => {
    tr.addEventListener('click', () => selectTeam(parseInt(tr.dataset.team)));
  });
  if (selectedTeam != null) {
    teamsScroll.querySelector('tr.active')?.scrollIntoView({ block: 'nearest' });
  }
}

// ── Select team ─────────────────────────────────────────────────────────────

async function selectTeam(teamNumber) {
  if (selectedTeam === teamNumber) return;
  selectedTeam = teamNumber;
  selectedMatchKey = null;
  videoPanel.classList.remove('visible');
  ytEmbed.src = '';

  teamsScroll.querySelectorAll('#teams-table tbody tr').forEach(tr => {
    tr.classList.toggle('active', parseInt(tr.dataset.team) === teamNumber);
  });

  const team = teamsData.find(t => t.team_number === teamNumber);
  matchesHeader.textContent = `Matches — ${team?.nickname ?? teamNumber} (${teamNumber})`;
  matchesScroll.innerHTML = '<div class="loading-msg">Loading matches…</div>';

  const year = (currentEvent.match(/^(\d{4})/) || [, new Date().getFullYear()])[1];

  try {
    const r = await fetch(`/api/team/${teamNumber}/matches/${year}`);
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.statusText);
    allMatches = data;
    // Fetch event names for all events before rendering
    const keys = [...new Set(data.map(m => m.event_key))];
    await fetchEventNames(keys);
    renderMatches(teamNumber);
  } catch (e) {
    matchesScroll.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

// ── Render matches ──────────────────────────────────────────────────────────

function teamCells(keys, alliance, selectedFrc) {
  const padded = [...keys, '', '', ''].slice(0, 3);
  return padded.map(k => {
    if (!k) return `<td class="tc ${alliance}"></td>`;
    const n = k.replace('frc', '');
    const hl = k === selectedFrc ? ' hl' : '';
    return `<td class="tc ${alliance}${hl}">${n}</td>`;
  }).join('');
}

function renderMatches(teamNumber) {
  if (!allMatches.length) {
    matchesScroll.innerHTML = '<div class="placeholder">No matches found for this year</div>';
    return;
  }

  const groups = new Map();
  for (const m of allMatches) {
    if (!groups.has(m.event_key)) groups.set(m.event_key, []);
    groups.get(m.event_key).push(m);
  }

  const sortedEvents = [...groups.keys()].sort((a, b) => {
    if (a === currentEvent) return -1;
    if (b === currentEvent) return 1;
    const ta = groups.get(a)[0]?.time ?? 0;
    const tb = groups.get(b)[0]?.time ?? 0;
    return tb - ta;
  });

  const teamFrc = `frc${teamNumber}`;
  let h = '';

  for (const eventKey of sortedEvents) {
    const matches = groups.get(eventKey).sort((a, b) => {
      const ka = matchSortKey(a), kb = matchSortKey(b);
      for (let i = 0; i < ka.length; i++) if (ka[i] !== kb[i]) return ka[i] - kb[i];
      return 0;
    });

    const isCurrent = eventKey === currentEvent;
    const eventName = eventNameCache[eventKey] || eventKey;

    h += `<div class="event-group">
      <div class="event-group-title">${eventName}${isCurrent ? ' · current' : ''}</div>
      <table class="match-table">
        <thead><tr>
          <th class="th-match"></th>
          <th class="th-score">Score</th>
          <th colspan="3" class="th-red">Red Alliance</th>
          <th colspan="3" class="th-blue">Blue Alliance</th>
        </tr></thead>
        <tbody>`;

    for (const m of matches) {
      const red  = m.alliances?.red?.team_keys  ?? [];
      const blue = m.alliances?.blue?.team_keys ?? [];
      const rs = m.alliances?.red?.score;
      const bs = m.alliances?.blue?.score;
      const winner = m.winning_alliance;
      const hasVideo = m.videos?.some(v => v.type === 'youtube');
      const isActive = m.key === selectedMatchKey;

      const redRp  = getRpDotCount(m, 'red');
      const blueRp = getRpDotCount(m, 'blue');
      const rdots  = Array(redRp) .fill('<span class="rp-dot r"></span>').join('');
      const bdots  = Array(blueRp).fill('<span class="rp-dot b"></span>').join('');

      const scoreCell = `<td class="td-score">
        <div class="score-line">
          <span class="s-r${winner === 'red'  ? ' win' : ''}">${scoreDisplay(rs)}</span>
          <span class="score-sep">–</span>
          <span class="s-b${winner === 'blue' ? ' win' : ''}">${scoreDisplay(bs)}</span>
        </div>
        <div class="rp-row">
          <div class="rp-grp">${rdots}</div>
          <div class="rp-grp">${bdots}</div>
        </div>
      </td>`;

      h += `<tr class="${isActive ? 'active ' : ''}${hasVideo ? 'has-video' : ''}" data-key="${m.key}">
        <td class="td-match${hasVideo ? ' has-video' : ''}">${matchLabel(m)}</td>
        ${scoreCell}
        ${teamCells(red, 'r', teamFrc)}
        ${teamCells(blue, 'b', teamFrc)}
      </tr>`;
    }

    h += `</tbody></table></div>`;
  }

  matchesScroll.innerHTML = h;
  matchesScroll.querySelectorAll('.match-table tbody tr').forEach(tr => {
    tr.addEventListener('click', () => {
      const match = allMatches.find(m => m.key === tr.dataset.key);
      if (match) selectMatch(match);
    });
  });
}

// ── Select match ─────────────────────────────────────────────────────────────

function selectMatch(match) {
  selectedMatchKey = match.key;
  matchesScroll.querySelectorAll('.match-table tbody tr').forEach(tr => {
    tr.classList.toggle('active', tr.dataset.key === match.key);
  });

  const yt = match.videos?.find(v => v.type === 'youtube');
  if (yt) {
    ytEmbed.src = `https://www.youtube.com/embed/${yt.key}`;
    videoPanel.classList.add('visible');
  } else {
    videoPanel.classList.remove('visible');
    ytEmbed.src = '';
  }
}

// ── Refresh EPA ──────────────────────────────────────────────────────────────

btnRefresh.addEventListener('click', async () => {
  if (!currentEvent) return;
  btnRefresh.disabled = true;
  setStatus('Refreshing EPA from Statbotics…');
  try {
    const r = await fetch(`/api/event/${currentEvent}/refresh`, { method: 'POST' });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || r.statusText);
    setStatus(`EPA refreshed — ${data.updated} teams updated`);
    const r2 = await fetch(`/api/event/${currentEvent}/teams`);
    const data2 = await r2.json();
    if (r2.ok) { teamsData = data2; renderTeams(); }
  } catch (e) {
    setStatus(`Refresh failed: ${e.message}`, true);
  } finally {
    btnRefresh.disabled = false;
  }
});

// ── Draggable resize handles ──────────────────────────────────────────────────

let hDrag = false, hStartX = 0, hStartW = 0;
let vDrag = false, vStartY = 0, vStartH = 0;

hResizer.addEventListener('mousedown', e => {
  hDrag = true;
  hStartX = e.clientX;
  hStartW = leftPanel.offsetWidth;
  hResizer.classList.add('dragging');
  document.body.classList.add('dragging-h');
  e.preventDefault();
});

vResizer.addEventListener('mousedown', e => {
  vDrag = true;
  vStartY = e.clientY;
  vStartH = videoPanel.offsetHeight;
  vResizer.classList.add('dragging');
  document.body.classList.add('dragging-v');
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (hDrag) {
    const w = Math.max(240, Math.min(window.innerWidth * 0.7, hStartW + (e.clientX - hStartX)));
    leftPanel.style.width = w + 'px';
  }
  if (vDrag) {
    // Drag up → bigger video; drag down → smaller video
    const h = Math.max(160, Math.min(window.innerHeight * 0.75, vStartH - (e.clientY - vStartY)));
    videoPanel.style.height = h + 'px';
  }
});

document.addEventListener('mouseup', () => {
  if (hDrag) { hDrag = false; hResizer.classList.remove('dragging'); document.body.classList.remove('dragging-h'); }
  if (vDrag) { vDrag = false; vResizer.classList.remove('dragging'); document.body.classList.remove('dragging-v'); }
});
</script>
</body>
</html>
